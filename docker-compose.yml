version: '3.8'

services:
  ml-service:
    build: .
    container_name: ml_service
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
    volumes:
      - ./models:/app/models
      - ./predictions.db:/app/predictions.db
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload